services:

  postgres:
    image: postgres:16-alpine
    container_name: bibliotheque-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bibliotheque
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bibliotheque-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: bibliotheque-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./front/.env
    depends_on:
      - api

volumes:
  postgres_data:
