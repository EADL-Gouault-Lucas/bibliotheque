services:

  postgres:
    image: postgres:16-alpine
    container_name: bibliotheque-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bibliotheque
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bibliotheque-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bibliotheque
      DB_PORT: "5432"
      TOKEN_SECRET: "cle-secrete-a-changer"
    ports:
      - "8080:8080"

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: bibliotheque-front
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      API_URL: http://api:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data:
