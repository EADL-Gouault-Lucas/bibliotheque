name: CI — Frontend

on:
  push:
  workflow_dispatch:

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Download dependencies
        run: cd front && go mod download
      - name: Build
        run: make build-front

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Download dependencies
        run: cd front && go mod download
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Generate templates
        run: make templ
      - name: Lint
        run: make lint-front

  # ── Tests unitaires ────────────────────────────────────────────────────────
  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templates
        run: make templ
      - name: Download dependencies
        run: cd front && go mod download
      - name: Run unit tests
        run: cd front && go test -tags unit -v ./...

  # ── Tests e2e ──────────────────────────────────────────────────────────────
  test-e2e:
    name: Tests e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templates
        run: make templ
      - name: Download dependencies
        run: cd front && go mod download
      - name: Run e2e tests
        run: cd front && go test -tags e2e -v ./...

  # ── Audit des dépendances ──────────────────────────────────────────────────
  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Download dependencies
        run: cd front && go mod download
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Generate templates
        run: make templ
      - name: Audit
        run: make vuln-front
