name: CI — Frontend

on:
  push:
  workflow_dispatch:

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templates
        run: templ generate
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build ./...

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templates
        run: templ generate
      - name: Téléchargement dépendances
        run: go mod download
      - name: Installation golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Linter
        run: golangci-lint run ./...

  # ── Tests unitaires ────────────────────────────────────────────────────────
  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templates
        run: templ generate
      - name: Download dependencies
        run: go mod download
      - name: Run unit tests
        run: go test -tags unit -v ./...

  # ── Tests e2e ──────────────────────────────────────────────────────────────
  test-e2e:
    name: Tests e2e
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Install Templ CLI
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templates
        run: templ generate
      - name: Download dependencies
        run: go mod download
      - name: Run e2e tests
        run: go test -tags e2e -v ./...

  # ── Audit des dépendances ──────────────────────────────────────────────────
  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: front/go.mod
          cache-dependency-path: front/go.sum
      - name: Installer Templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Générer les templates
        run: templ generate
      - name: Download dependencies
        run: go mod download
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
