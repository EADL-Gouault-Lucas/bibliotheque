name: CI - Frontend

on:
  workflow_call:
  workflow_dispatch:

jobs:
  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    uses: ./.github/workflows/front-build.yml

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: build
    uses: ./.github/workflows/front-lint.yml

  # ── Tests ───────────────────────────────────────────────────────────────────
  tests:
    name: Tests
    needs: build
    uses: ./.github/workflows/front-test.yml

  # ── Audit sécurité ──────────────────────────────────────────────────────────
  audit:
    name: Audit
    needs: build
    uses: ./.github/workflows/front-audit.yml
