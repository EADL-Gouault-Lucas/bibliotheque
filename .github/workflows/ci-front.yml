name: CI — Frontend

on:
  push:
  workflow_dispatch:

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-front
      - name: Build
        run: make build-front

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-front
      - name: Installation golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Lint
        run: make lint-front

  # ── Tests unitaires ────────────────────────────────────────────────────────
  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-front
      - name: Run unit tests
        run: cd front && go test -tags unit -v ./...

  # ── Tests e2e ──────────────────────────────────────────────────────────────
  test-e2e:
    name: Tests e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-front
      - name: Run e2e tests
        run: cd front && go test -tags e2e -v ./...

  # ── Audit des dépendances ──────────────────────────────────────────────────
  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-front
      - name: Installation govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Audit
        run: make vuln-front
