name: CI - API

on:
  workflow_call:
  workflow_dispatch:

jobs:
  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    uses: ./.github/workflows/api-build.yml

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: build
    uses: ./.github/workflows/api-lint.yml

  # ── Tests ───────────────────────────────────────────────────────────────────
  tests:
    name: Tests
    needs: build
    uses: ./.github/workflows/api-test.yml

  # ── Audit sécurité ──────────────────────────────────────────────────────────
  audit:
    name: Audit
    needs: build
    uses: ./.github/workflows/api-audit.yml

  # ── Documentation Swagger ───────────────────────────────────────────────────
  docs:
    name: Documentation Swagger
    needs: build
    uses: ./.github/workflows/api-docs.yml
