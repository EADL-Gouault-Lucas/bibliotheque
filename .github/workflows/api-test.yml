name: API - Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  # ── Tests unitaires ─────────────────────────────────────────────────────────
  unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-api
      - name: Tests unitaires
        run: make test-api-unit
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.out

  # ── Tests base de données ───────────────────────────────────────────────────
  database:
    name: Tests base de données
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bibliotheque_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bibliotheque_test
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-api
      - name: Tests base de données
        run: make test-api-db

  # ── Tests e2e ───────────────────────────────────────────────────────────────
  e2e:
    name: Tests e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bibliotheque_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bibliotheque_test
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-api
      - name: Tests e2e
        run: make test-api-e2e
