name: Publication Docker

on:
  workflow_call:
    inputs:
      version:
        description: "Tag de version"
        required: false
        type: string
        default: ''
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            context: ./api
          - service: front
            context: ./front

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Normaliser le nom du propriétaire en minuscules
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Connexion à ghcr.io
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/bibliotheque-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=sha,prefix=

      - name: Build et push
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan de sécurité Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.name }}/bibliotheque-${{ matrix.service }}:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload résultats
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: docker-${{ matrix.service }}

      - name: Scan de sécurité Trivy (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.name }}/bibliotheque-${{ matrix.service }}:latest
          format: table
          output: trivy-report.txt
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Afficher le rapport dans le résumé
        if: always()
        run: |
          echo "## Trivy - bibliotheque-${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY