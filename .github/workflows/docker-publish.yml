name: Publication Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            context: ./api
          - service: front
            context: ./front

    steps:
      - uses: actions/checkout@v4

      - name: Connexion à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bibliotheque-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build et push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
