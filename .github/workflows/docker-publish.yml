name: Publication Docker

on:
  workflow_call:
    inputs:
      version:
        description: "Tag de version"
        required: false
        type: string
        default: ''
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            context: ./api
          - service: front
            context: ./front

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Connexion à ghcr.io
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/bibliotheque-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=sha,prefix=

      - name: Build et push
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan de sécurité Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/bibliotheque-${{ matrix.service }}:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          severity: CRITICAL