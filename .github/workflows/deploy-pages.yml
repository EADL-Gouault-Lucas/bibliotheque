name: Deploy - GitHub Pages

on:
  workflow_call:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    name: Déploiement Swagger sur GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-api

      - name: Préparer les fichiers pour GitHub Pages
        run: |
          mkdir -p pages
          cp api/docs/swagger.json pages/
          cp api/docs/swagger.yaml pages/
          cat > pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Bibliothèque - API Documentation</title>
            <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
            <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
            <script>
              window.onload = function () {
                SwaggerUIBundle({
                  url: "./swagger.json",
                  dom_id: "#swagger-ui",
                  presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
                  layout: "StandaloneLayout",
                });
              };
            </script>
          </body>
          </html>
          EOF

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Uploader l'artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
