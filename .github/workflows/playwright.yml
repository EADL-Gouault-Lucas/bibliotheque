name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bibliotheque
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bibliotheque
      API_URL: http://localhost:8080
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - uses: actions/setup-go@v5
      with:
        go-version-file: api/go.mod
        cache-dependency-path: api/go.sum
    - name: Install Go dependencies
      run: |
        cd api && go mod download
        cd ../front && go mod download
    - name: Install tools (swag, templ)
      run: |
        go install github.com/swaggo/swag/cmd/swag@latest
        go install github.com/a-h/templ/cmd/templ@latest
    - name: Generate (swagger + templ)
      run: |
        make swag
        make templ
    - name: Build API and frontend
      run: |
        make build-api
        make build-front
    - name: Start API
      run: make run-api &
      env:
        PORT: 8080
    - name: Start frontend
      run: make run-front &
      env:
        PORT: 3000
    - name: Seed database
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
        PGPASSWORD=postgres psql -h localhost -U postgres -d bibliotheque -f api/cmd/sql/seed.sql
    - name: Wait for servers
      run: |
        npx wait-on http://localhost:8080/swagger/index.html http://localhost:3000 --timeout 30000
    - name: Install Playwright Browsers
      run: make playwright-install
    - name: Run Playwright tests
      run: make playwright-test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
