name: Tests Playwright

on:
  workflow_call:
  workflow_dispatch:

jobs:
  playwright:
    name: Tests Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bibliotheque
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bibliotheque
      API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: ./.github/actions/setup-api
      - uses: ./.github/actions/setup-front
      - name: Build API et frontend
        run: make build
      - name: Injecter le jeu de données
        run: make seed-test-db
      - name: Démarrer l'API en arrière-plan
        run: make run-api &
        env:
          PORT: 8080
      - name: Démarrer le frontend en arrière-plan
        run: make run-front &
        env:
          PORT: 3000
      - name: Attendre les serveurs
        run: npx wait-on tcp:localhost:8080 tcp:localhost:3000 --timeout 60000
      - name: Installer Playwright et les navigateurs
        run: make playwright-install
      - name: Tests Playwright
        run: make playwright-test
      - name: Upload du rapport Playwright
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
