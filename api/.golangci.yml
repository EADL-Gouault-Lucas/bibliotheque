version: "2"

linters:
  default: none
  enable:
    - errcheck        # erreurs non vérifiées
    - govet           # constructions suspectes
    - staticcheck     # analyse statique avancée
    - unused          # code mort
    - misspell        # fautes d'orthographe
    - gosec           # failles de sécurité
    - sqlclosecheck   # rows/statements SQL non fermés
    - noctx           # requêtes HTTP sans context

  settings:
    staticcheck:
      checks:
        - "all"
        - "-ST1005"   # autorise les majuscules dans les error strings
        - "-ST1000"

formatters:
  enable:
    - gofmt           # formatage
